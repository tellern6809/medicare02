<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { 
            margin:0; 
            padding:0; 
            box-sizing:border-box;
        }
        body {
             background: #f0f4f8; 
             display:flex; 
             align-items:center; 
             justify-content:center; 
             min-height:100vh; 
             font-family:'DM Sans',sans-serif;
            }
        .error-box { 
            text-align:center; 
            padding:60px 40px; 
            background:#fff; 
            border-radius:20px; 
            box-shadow:0 10px 40px rgba(0,0,0,.08); 
            max-width:500px; 
        }
        .error-icon { 
            font-size:80px; 
            color:#2563eb; 
            margin-bottom:20px; 
        }
        h1 { 
            font-family:'Playfair Display',serif; 
            font-size:28px; 
            color:#1e293b; 
            margin-bottom:10px; 
        }
        p { 
            color:#64748b; 
            margin-bottom:30px; 
        }
        a { 
            display:inline-block; 
            background:#2563eb; 
            color:#fff; 
            padding:12px 28px; 
            border-radius:10px; 
            text-decoration:none; 
            font-weight:500; 
        }
        a:hover { 
            background:#1d4ed8; 
        }
    </style>
</head>
<body>
<div class="error-box">
    <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/"><i class="fa-solid fa-house"></i> Return Home</a>
</div>
</body>
</html>
